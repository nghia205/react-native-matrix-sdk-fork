---
crate:
  repo: https://github.com/matrix-org/matrix-rust-sdk
  rev: 2c2e0f1b152c4a8dcbbb7b5347f5494a57516bc2
  manifestPath: bindings/matrix-sdk-ffi/Cargo.toml
android:
  cargoExtras: []
  directory: android
  native_bindings_dir: kotlin
  useSharedLibrary: true
  jniLibs: src/main/jniLibs
  targets:
    - arm64-v8a
    - x86_64
ios:
  cargoExtras: []
  directory: ios
  native_bindings_dir: swift
  targets:
    - aarch64-apple-ios
    - aarch64-apple-ios-sim
    - x86_64-apple-ios
  xcodebuildExtras: []
  frameworkName: build/RnMatrixRustSdk
noOverwrite:
  - "android/build.gradle"
turboModule:
  cpp: cpp
  ts: src
bindings:
  cpp: cpp/generated
  ts: src/generated
